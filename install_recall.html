<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Recall — Action Install Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--red:#dc2626;--red2:#991b1b;--red3:#450a0a;--bg:#080808;--s1:#111;--s2:#181818;--s3:#202020;--wire:rgba(255,255,255,0.06);--wire2:rgba(255,255,255,0.10);--muted:#666;--faint:#333;--text:#efefef;--green:#10b981;--amber:#f59e0b;}
        html.light{--bg:#f4f4f4;--s1:#fff;--s2:#ebebeb;--s3:#e0e0e0;--wire:rgba(0,0,0,.08);--wire2:rgba(0,0,0,.14);--muted:#555;--faint:#999;--text:#111;--red3:#fde8e8;}
        html.light body::after{display:none;}
        html.light input,html.light select,html.light textarea{background:var(--s3);border-color:var(--wire2);color:var(--text);}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
        body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:999;}
        .page{max-width:840px;margin:0 auto;padding:24px 20px 80px;}
        .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;}
        .back{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
        .back:hover{color:var(--text);}
        .eyebrow{font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;letter-spacing:.25em;color:var(--red);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-top:18px;}
        .eyebrow::before{content:'';width:20px;height:2px;background:var(--red);}
        h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,7vw,72px);line-height:.9;letter-spacing:2px;margin:2px 0 4px;}
        h1 em{font-style:normal;color:var(--red);}
        .sub{font-size:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:28px;}
        .card{background:var(--s1);border:1px solid var(--wire);border-top:2px solid var(--red);padding:28px 30px;margin-bottom:22px;}
        .sec-lbl{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:4px 0 16px;}
        .field{margin-bottom:18px;}
        .field label{display:block;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
        .field input,.field select,.field textarea{width:100%;background:var(--s3);border:1px solid var(--wire2);color:var(--text);padding:13px 14px;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
        .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);}
        .field input::placeholder,.field textarea::placeholder{color:var(--faint);}
        .field textarea{resize:vertical;min-height:80px;}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        @media(max-width:560px){.row2{grid-template-columns:1fr;}}
        /* match panel */
        .match{border:1px solid var(--wire2);border-left:3px solid var(--muted);background:var(--s2);padding:16px 18px;margin-bottom:18px;font-size:13px;color:var(--muted);}
        .match.found{border-left-color:var(--green);}
        .match.none{border-left-color:var(--amber);}
        .match .m-title{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
        .match.found .m-title{color:var(--green);}
        .match.none .m-title{color:var(--amber);}
        .match .m-row{color:var(--text);line-height:1.7;}
        .match .m-row b{color:var(--text);}
        .match .m-row span{color:var(--muted);}
        /* fault radio */
        .fault-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
        @media(max-width:560px){.fault-grid{grid-template-columns:1fr;}}
        .fault{background:var(--s2);border:1px solid var(--wire);border-top:3px solid var(--faint);padding:16px;cursor:pointer;text-align:center;transition:all .15s;}
        .fault:hover{background:var(--s3);}
        .fault.on{border-top-color:var(--red);background:var(--red3);}
        .fault .f-icon{font-size:24px;display:block;margin-bottom:6px;}
        .fault .f-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);}
        .fault .f-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3;}
        .btn{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:16px 24px;border:none;cursor:pointer;}
        .btn-primary{background:var(--red);color:#fff;width:100%;}
        .btn-primary:hover{background:var(--red2);}
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:14px 28px;z-index:9999;transition:transform .3s;}
        #toast.show{transform:translateX(-50%) translateY(0);}
        @media (max-width:640px){
            .page{padding-left:14px;padding-right:14px;}
            input[type=text],input[type=number],textarea,select{font-size:16px;min-height:54px;padding:14px 16px;}
            textarea{min-height:84px;}
            .btn,.btn-primary{min-height:56px;font-size:15px;padding:16px 22px;}
            .toggle{min-height:58px;padding:15px 16px;}
            .fault{min-height:64px;padding:16px;}
            .fault-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
<div style="position:fixed;top:12px;right:16px;z-index:9999;display:flex;gap:8px;">
  <button onclick="toggleLang()" style="background:var(--s2);border:1px solid var(--wire2);color:var(--muted);font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;">🌐 <span id="langLabel">EN</span></button>
  <button onclick="toggleTheme()" style="background:var(--s2);border:1px solid var(--wire2);color:var(--muted);font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;"><span id="themeIcon">☀️</span><span id="themeLabel">LIGHT</span></button>
</div>
<script>
(function(){var t=localStorage.getItem('aitTheme')||'dark';applyTheme(t);})();
function applyTheme(t){localStorage.setItem('aitTheme',t);var i=document.getElementById('themeIcon'),l=document.getElementById('themeLabel');if(t==='light'){document.documentElement.classList.add('light');if(i)i.textContent='🌙';if(l)l.textContent='DARK';}else{document.documentElement.classList.remove('light');if(i)i.textContent='☀️';if(l)l.textContent='LIGHT';}}
function toggleTheme(){var c=localStorage.getItem('aitTheme')||'dark';applyTheme(c==='dark'?'light':'dark');}
</script>

<script>
const I18N={
 back:{en:'← Dashboard',es:'← Tablero'},
 eyebrow:{en:'Callback',es:'Rellamada'},
 h1a:{en:'Log a ',es:'Registrar una '},
 h1b:{en:'Recall',es:'Rellamada'},
 sub:{en:'Link it to the original job and tag what went wrong',es:'Vincúlala al trabajo original y marca qué salió mal'},
 sec_orig:{en:'Original Job',es:'Trabajo Original'},
 lbl_origjob:{en:'Original Job Number',es:'Número de Trabajo Original'},
 ph_origjob:{en:'Type the job # to auto-link the original install',es:'Escribe el # de trabajo para vincular la instalación original'},
 sec_details:{en:'Recall Details',es:'Detalles de la Rellamada'},
 lbl_customer:{en:'Customer Name',es:'Nombre del Cliente'},
 ph_customer:{en:'Customer on the original job',es:'Cliente del trabajo original'},
 lbl_division:{en:'Division',es:'División'},
 opt_underground:{en:'Underground',es:'Subterráneo'},
 opt_plumbing:{en:'Plumbing Install',es:'Instalación de Plomería'},
 opt_hvac:{en:'HVAC Install',es:'Instalación de HVAC'},
 opt_electrical:{en:'Electrical Install',es:'Instalación Eléctrica'},
 lbl_reason:{en:'What Was the Recall For?',es:'¿Para Qué Fue la Rellamada?'},
 ph_reason:{en:'e.g. Water heater leaking at the cold inlet fitting',es:'ej. Calentador goteando en la conexión de entrada fría'},
 lbl_date:{en:'Recall Date',es:'Fecha de Rellamada'},
 sec_fault:{en:'Fault Type',es:'Tipo de Falla'},
 fi_name:{en:'Install Error',es:'Error de Instalación'},
 fi_desc:{en:'Workmanship / how it was installed',es:'Mano de obra / cómo se instaló'},
 fm_name:{en:'Manufacturer',es:'Fabricante'},
 fm_desc:{en:'Defective part or equipment',es:'Parte o equipo defectuoso'},
 fo_name:{en:'Other',es:'Otro'},
 fo_desc:{en:'Customer-caused, unrelated, etc.',es:'Causado por el cliente, no relacionado, etc.'},
 lbl_notes:{en:'Notes',es:'Notas'},
 ph_notes:{en:'Anything else about the callback',es:'Cualquier otra cosa sobre la rellamada'},
 btn_save:{en:'↩️ Save Recall',es:'↩️ Guardar Rellamada'},
 m_found:{en:'✓ Original install found',es:'✓ Instalación original encontrada'},
 m_installedby:{en:'Installed by',es:'Instalado por'},
 m_none_title:{en:'No matching install on file',es:'No se encontró instalación coincidente'},
 m_none_body:{en:'This recall will be saved without a linked original job. Double-check the job number, or continue if the original predates the tracker.',es:'Esta rellamada se guardará sin un trabajo original vinculado. Verifica el número de trabajo, o continúa si el original es anterior al rastreador.'},
 t_needjob:{en:'Enter the original job number',es:'Ingresa el número de trabajo original'},
 t_needreason:{en:'Describe what the recall was for',es:'Describe para qué fue la rellamada'},
 t_saved:{en:'Recall logged ✓',es:'Rellamada registrada ✓'},
 t_failed:{en:'Save failed — check connection',es:'Error al guardar — revisa la conexión'}
};
let LANG=localStorage.getItem('aitLang')||'en';
function t(k){const e=I18N[k];return e?(e[LANG]||e.en):k;}
function toggleLang(){LANG=LANG==='en'?'es':'en';localStorage.setItem('aitLang',LANG);location.reload();}
function applyStaticLang(){document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-ph'));});const ll=document.getElementById('langLabel');if(ll)ll.textContent=LANG==='en'?'EN':'ES';}
document.addEventListener('DOMContentLoaded',applyStaticLang);
</script>

<div class="page">
    <div class="top"><a href="install_index.html" class="back" data-i18n="back">← Dashboard</a></div>
    <div class="eyebrow" data-i18n="eyebrow">Callback</div>
    <h1><span data-i18n="h1a">Log a </span><em data-i18n="h1b">Recall</em></h1>
    <div class="sub" data-i18n="sub">Link it to the original job and tag what went wrong</div>

    <div class="card">
        <div class="sec-lbl" data-i18n="sec_orig">Original Job</div>
        <div class="field"><label data-i18n="lbl_origjob">Original Job Number</label><input id="origJob" type="text" data-i18n-ph="ph_origjob" placeholder="Type the job # to auto-link the original install" /></div>
        <div class="match" id="matchPanel" style="display:none;"></div>
    </div>

    <div class="card">
        <div class="sec-lbl" data-i18n="sec_details">Recall Details</div>
        <div class="row2">
            <div class="field"><label data-i18n="lbl_customer">Customer Name</label><input id="customerName" type="text" data-i18n-ph="ph_customer" placeholder="Customer on the original job" /></div>
            <div class="field"><label data-i18n="lbl_division">Division</label>
                <select id="division">
                    <option value="underground" data-i18n="opt_underground">Underground</option>
                    <option value="plumbing" data-i18n="opt_plumbing">Plumbing Install</option>
                    <option value="hvac" data-i18n="opt_hvac">HVAC Install</option>
                    <option value="electrical" data-i18n="opt_electrical">Electrical Install</option>
                </select>
            </div>
        </div>
        <div class="field"><label data-i18n="lbl_reason">What Was the Recall For?</label><textarea id="reason" data-i18n-ph="ph_reason" placeholder="e.g. Water heater leaking at the cold inlet fitting"></textarea></div>
        <div class="field"><label data-i18n="lbl_date">Recall Date</label><input id="recallDate" type="date" /></div>
    </div>

    <div class="card">
        <div class="sec-lbl" data-i18n="sec_fault">Fault Type</div>
        <div class="fault-grid">
            <div class="fault" data-f="install"><span class="f-icon">🛠️</span><div class="f-name" data-i18n="fi_name">Install Error</div><div class="f-desc" data-i18n="fi_desc">Workmanship / how it was installed</div></div>
            <div class="fault" data-f="manufacturer"><span class="f-icon">🏭</span><div class="f-name" data-i18n="fm_name">Manufacturer</div><div class="f-desc" data-i18n="fm_desc">Defective part or equipment</div></div>
            <div class="fault" data-f="other"><span class="f-icon">❔</span><div class="f-name" data-i18n="fo_name">Other</div><div class="f-desc" data-i18n="fo_desc">Customer-caused, unrelated, etc.</div></div>
        </div>
        <div class="field" style="margin-top:18px;"><label data-i18n="lbl_notes">Notes</label><textarea id="notes" data-i18n-ph="ph_notes" placeholder="Anything else about the callback"></textarea></div>
    </div>

    <button class="btn btn-primary" id="saveBtn" data-i18n="btn_save">↩️ Save Recall</button>
</div>
<div id="toast"></div>

<script>
// ════ FIREBASE — paste your INSTALL TRACKER project config (same as install_index.html) ════
firebase.initializeApp({
    apiKey: "AIzaSyBdTIdrCajlNM4_BYgJxZwFe0KXKgKw7yM",
    authDomain: "install-tracker-30b1b.firebaseapp.com",
    databaseURL: "https://install-tracker-30b1b-default-rtdb.firebaseio.com",
    projectId: "install-tracker-30b1b",
    storageBucket: "install-tracker-30b1b.firebasestorage.app",
    messagingSenderId: "160965691779",
    appId: "1:160965691779:web:c42baf2dd271a275994eb6"
});
const db=firebase.database();
const GROUP_NAMES={underground:'Underground',plumbing:'Plumbing Install',hvac:'HVAC Install',electrical:'Electrical Install'};

const SESSION_KEY='ait_session',TIMEOUT_MS=30*60*1000;
function getSession(){try{return JSON.parse(localStorage.getItem(SESSION_KEY));}catch{return null;}}
const sess=getSession();
if(!sess||(Date.now()-(sess.lastActivity||0))>=TIMEOUT_MS){location.href='install_index.html';}

let allLogs={}, faultType='install', matchedJob=null;
document.getElementById('recallDate').value=new Date().toISOString().slice(0,10);

db.ref('installLogs').on('value',snap=>{allLogs=snap.val()||{};tryMatch();});

document.querySelectorAll('.fault').forEach(f=>{
    f.classList.toggle('on',f.dataset.f===faultType);
    f.onclick=()=>{faultType=f.dataset.f;document.querySelectorAll('.fault').forEach(x=>x.classList.toggle('on',x===f));};
});

let _deb;
document.getElementById('origJob').oninput=()=>{clearTimeout(_deb);_deb=setTimeout(tryMatch,250);};

function findInstallByJob(job){
    const j=(job||'').trim().toLowerCase();if(!j)return null;
    let hit=null;
    Object.entries(allLogs).forEach(([dk,day])=>Object.entries(day).forEach(([id,r])=>{
        if((r.jobNumber||'').trim().toLowerCase()===j){if(!hit||(r.ts||0)<(hit.ts||0))hit={...r,_id:id,_dk:dk};}
    }));
    return hit; // earliest matching install = the original
}

function tryMatch(){
    const job=document.getElementById('origJob').value;
    const panel=document.getElementById('matchPanel');
    if(!job.trim()){panel.style.display='none';matchedJob=null;return;}
    const hit=findInstallByJob(job);
    panel.style.display='block';
    if(hit){
        matchedJob=hit;
        panel.className='match found';
        panel.innerHTML=`<div class="m-title">${t('m_found')}</div>
            <div class="m-row"><b>${hit.customerName||'—'}</b> <span>· Job #${hit.jobNumber}</span></div>
            <div class="m-row"><span>${t('m_installedby')}</span> <b>${hit.installerName||'—'}</b> <span>· ${GROUP_NAMES[hit.group]||hit.group} · ${new Date(hit.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></div>
            ${hit.whatInstalled?`<div class="m-row"><span>${hit.whatInstalled}</span></div>`:''}`;
        // auto-fill
        if(hit.customerName&&!document.getElementById('customerName').value)document.getElementById('customerName').value=hit.customerName;
        if(hit.group)document.getElementById('division').value=hit.group;
    }else{
        matchedJob=null;
        panel.className='match none';
        panel.innerHTML=`<div class="m-title">${t('m_none_title')}</div>
            <div class="m-row"><span>${t('m_none_body')}</span></div>`;
    }
}

function dkOf(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

document.getElementById('saveBtn').onclick=()=>{
    const origJob=document.getElementById('origJob').value.trim();
    const customerName=document.getElementById('customerName').value.trim();
    const reason=document.getElementById('reason').value.trim();
    if(!origJob){toast(t('t_needjob'),'#dc2626');return;}
    if(!reason){toast(t('t_needreason'),'#dc2626');return;}
    const dateStr=document.getElementById('recallDate').value||dkOf(new Date());
    const d=new Date(dateStr+'T12:00:00');
    const rec={
        originalJobNumber:origJob,
        customerName,
        division:document.getElementById('division').value,
        recallReason:reason,
        faultType,
        notes:document.getElementById('notes').value.trim(),
        loggedByName:sess.name||'',loggedById:sess.personId||'',
        // original-install linkage (attribution for recall-rate)
        originalPersonId: matchedJob?matchedJob.personId:null,
        originalInstallerName: matchedJob?matchedJob.installerName:null,
        originalCallId: matchedJob?matchedJob._id:null,
        originalDateKey: matchedJob?matchedJob._dk:null,
        linked: !!matchedJob,
        date:dateStr,ts:d.getTime()
    };
    db.ref('recalls/'+dkOf(d)).push(rec,err=>{
        if(err){toast(t('t_failed'),'#dc2626');return;}
        toast(t('t_saved'));
        setTimeout(()=>location.href='install_index.html',900);
    });
};

let _tt;function toast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'var(--green)';t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);}
</script>
</body>
</html>
