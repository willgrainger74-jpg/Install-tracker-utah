<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Recalls — Action Install Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
        :root{--red:#dc2626;--red2:#991b1b;--red3:#450a0a;--bg:#080808;--s1:#111111;--s2:#181818;--s3:#202020;--wire:rgba(255,255,255,0.06);--wire2:rgba(255,255,255,0.10);--muted:#aaa;--faint:#666;--text:#efefef;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;}
        html.light{--bg:#f4f4f4;--s1:#ffffff;--s2:#ebebeb;--s3:#e0e0e0;--wire:rgba(0,0,0,0.08);--wire2:rgba(0,0,0,0.14);--muted:#555555;--faint:#999999;--text:#111111;--red3:#fde8e8;}
        html.light body::after{display:none;}
        html.light input,html.light select,html.light textarea{background:var(--s3);border-color:var(--wire2);color:var(--text);}
        html.light input::placeholder,html.light textarea::placeholder{color:var(--faint);}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
        body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:999;}
        .page{max-width:1400px;margin:0 auto;padding:24px 20px 80px;}
        .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--wire);}
        .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6vw,72px);line-height:0.9;letter-spacing:2px;}
        .page-title em{font-style:normal;color:var(--red);}
        .page-sub{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
        .back-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);border:1px solid var(--wire2);padding:10px 18px;text-decoration:none;transition:all 0.15s;white-space:nowrap;margin-top:8px;display:inline-block;}
        .back-btn:hover{color:var(--text);border-color:var(--muted);}
        .card{background:var(--s1);border:1px solid var(--wire);padding:24px 28px;margin-bottom:20px;}
        .card-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text);margin-bottom:16px;}
        .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .cal-nav-btn{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--muted);background:var(--s2);border:1px solid var(--wire);padding:10px 20px;cursor:pointer;transition:all 0.15s;}
        .cal-nav-btn:hover{color:var(--text);border-color:var(--red);}
        .cal-range{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);}
        .cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
        .cal-day-label{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-align:center;padding:6px 0;}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
        .cal-day{background:var(--s2);border:1px solid var(--wire);border-top:2px solid transparent;padding:14px 8px;cursor:pointer;transition:all 0.15s;text-align:left;width:100%;}
        .cal-day:hover{border-top-color:var(--red);background:var(--s3);}
        .cal-day.has-calls{border-top-color:var(--red);background:rgba(68,10,10,0.4);}
        .cal-day.selected{border-color:rgba(220,38,38,0.5);border-top-color:var(--red);background:var(--red3);box-shadow:0 0 0 1px var(--red);}
        .cal-day-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);line-height:1;}
        .cal-day-stat{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.04em;color:var(--red);margin-top:4px;}
        .cal-day-empty{font-size:13px;color:var(--muted);margin-top:4px;}
        .calls-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
        .btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:10px 20px;border:none;cursor:pointer;transition:all 0.15s;}
        .btn-red{background:var(--red);color:#fff;}
        .btn-red:hover{background:var(--red2);}
        .btn-red:active{transform:scale(0.97);}
        .call-card{background:var(--s2);border:1px solid var(--wire);border-left:3px solid var(--red);padding:20px;margin-bottom:12px;}
        .call-card.continuing{border-left-color:var(--amber);}
        .call-card.approved{border-left-color:var(--green);}
        .lock-badge{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.4);padding:6px 12px;}
        .lock-note{font-size:12px;color:var(--green);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);padding:8px 12px;margin-bottom:12px;letter-spacing:.03em;}
        .call-card.approved input,.call-card.approved select,.call-card.approved textarea{opacity:.7;cursor:not-allowed;}
        .call-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
        .call-label{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
        .del-call{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);background:var(--red3);border:1px solid rgba(220,38,38,0.3);padding:6px 14px;cursor:pointer;transition:all 0.15s;}
        .del-call:hover{background:var(--red);color:#fff;}
        .field{margin-bottom:12px;}
        .field label{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
        input[type=text],input[type=number],input[type=tel],textarea,select{background:var(--s3);border:1px solid var(--wire2);color:var(--text);padding:10px 14px;width:100%;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;}
        input::placeholder,textarea::placeholder{color:var(--muted);}
        input:focus,textarea:focus,select:focus{border-color:var(--red);}
        select option{background:var(--s3);color:var(--text);}
        .check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s3);border:1px solid var(--wire);margin-bottom:6px;cursor:pointer;transition:border-color 0.15s;}
        .check-row:hover{border-color:var(--wire2);}
        .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red);flex-shrink:0;}
        .check-row span{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text);}
        .check-row.cont{background:rgba(245,158,11,0.10);border-color:rgba(245,158,11,0.35);}
        .check-row.cont input[type=checkbox]{accent-color:var(--amber);}
        .piece-list{display:flex;flex-direction:column;gap:6px;}
        .pay-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--s3);border:1px solid var(--wire);transition:border-color .15s;}
        .pay-row.on{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.07);}
        .pay-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);flex-shrink:0;}
        .pay-row .pr-label{flex:1;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);line-height:1.3;}
        .pay-row .pr-amt{display:flex;align-items:center;gap:3px;font-family:'Oswald',sans-serif;font-size:14px;color:var(--green);font-weight:600;flex-shrink:0;}
        .pay-row .pr-amt input{width:90px;background:var(--s1);border:1px solid var(--wire2);color:var(--text);padding:8px 10px;font-size:14px;text-align:right;}
        .pay-row .pr-qty{display:flex;align-items:center;gap:3px;font-family:'Oswald',sans-serif;font-size:14px;color:var(--muted);font-weight:600;flex-shrink:0;}
        .pay-row .pr-qty input{width:56px;background:var(--s1);border:1px solid var(--wire2);color:var(--text);padding:8px 8px;font-size:14px;text-align:center;}
        .pay-row .pr-line{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;color:var(--green);flex-shrink:0;min-width:74px;text-align:right;}
        .paytoggles{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px;}
        .check-row.pay-toggle{background:var(--s3);}
        .check-row.pay-toggle input[type=checkbox]{accent-color:var(--green);}
        @media(max-width:560px){.paytoggles{grid-template-columns:1fr;}.pay-row{flex-wrap:wrap;}}
        .job-pay{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:14px 16px;background:rgba(16,185,129,.10);border:1px solid rgba(16,185,129,.35);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
        .job-pay span{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;color:var(--green);}
        .trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
        @media(max-width:560px){.trade-grid{grid-template-columns:1fr;}}
        .divider{border:none;border-top:1px solid var(--wire);margin:16px 0;}
        .section-label{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
        .fab{position:fixed;bottom:28px;right:24px;z-index:1000;background:var(--red);color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;padding:14px 24px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(220,38,38,0.5);transition:all 0.15s;display:none;align-items:center;gap:8px;}
        .fab:hover{background:var(--red2);box-shadow:0 4px 28px rgba(220,38,38,0.7);}
        .fab:active{transform:scale(0.97);}
        .add-call-bottom{width:100%;background:transparent;border:2px dashed rgba(220,38,38,0.3);color:var(--red);font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:16px;cursor:pointer;transition:all 0.15s;margin-top:8px;}
        .add-call-bottom:hover{background:var(--red3);border-color:var(--red);}
        @media (max-width:640px){
            .page{padding:18px 12px 90px;}
            input[type=text],input[type=number],input[type=tel],textarea,select{font-size:16px;min-height:54px;padding:14px 16px;}
            textarea{min-height:84px;}
            .field label{font-size:14px;}
            .btn,.btn-red{min-height:56px;font-size:14px;padding:16px 22px;}
            .check-row{min-height:60px;padding:16px;}
            .check-row input[type=checkbox]{width:26px;height:26px;}
            .check-row span{font-size:14px;}
            .del-call{min-height:46px;padding:10px 18px;font-size:14px;}
            .add-call-bottom{padding:20px;font-size:14px;}
            .cal-grid{gap:3px;}
            .cal-day{padding:12px 4px;min-height:78px;}
            .cal-day-num{font-size:30px;}
            .cal-day-label{font-size:12px;}
            .fab{bottom:20px;right:16px;padding:16px 22px;font-size:14px;}
            .call-card{padding:18px 16px;}
            .cal-nav-btn{padding:14px 22px;font-size:20px;}
        }
    
        /* recall-specific */
        .match{border:1px solid var(--wire2);border-left:3px solid var(--muted);background:var(--s2);padding:12px 14px;margin:6px 0 12px;font-size:13px;color:var(--muted);}
        .match.found{border-left-color:var(--green);}
        .match.none{border-left-color:var(--amber);}
        .match .m-title{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
        .match.found .m-title{color:var(--green);}
        .match.none .m-title{color:var(--amber);}
        .match .m-row{color:var(--text);line-height:1.6;}
        .fault-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
        @media(max-width:560px){.fault-grid{grid-template-columns:1fr;}}
        .fault{background:var(--s3);border:1px solid var(--wire);border-top:3px solid var(--faint);padding:13px 8px;cursor:pointer;text-align:center;transition:all .15s;}
        .fault:hover{background:var(--s2);}
        .fault.on{border-top-color:var(--red);background:var(--red3);}
        .fault .f-icon{font-size:20px;display:block;margin-bottom:4px;}
        .fault .f-name{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);}
</style>
</head>

  <button onclick="toggleTheme()" style="background:var(--s2);border:1px solid var(--wire2);color:var(--muted);font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;"><span id="themeIcon">☀️</span><span id="themeLabel">LIGHT</span></button>

<script>
(function(){var t=localStorage.getItem('aitTheme')||'dark';applyTheme(t);})();
function applyTheme(t){localStorage.setItem('aitTheme',t);var i=document.getElementById('themeIcon'),l=document.getElementById('themeLabel');if(t==='light'){document.documentElement.classList.add('light');if(i)i.textContent='🌙';if(l)l.textContent='DARK';}else{document.documentElement.classList.remove('light');if(i)i.textContent='☀️';if(l)l.textContent='LIGHT';}}
function toggleTheme(){var c=localStorage.getItem('aitTheme')||'dark';applyTheme(c==='dark'?'light':'dark');}
</script>

const TIERS=[['helper1','Helper 1'],['helper2','Helper 2'],['helper3','Helper 3'],['lead1','Lead 1'],['lead2','Lead 2'],['lead3','Lead 3']];
const HOURLY_TIERS={helper1:20,helper2:24,helper3:28,lead1:30,lead2:35,lead3:40};

        {name:'Water Heater / Water Softener',helper1:100,helper2:100,helper3:180,lead1:180,lead2:180,lead3:180}
    ],
    plumbing:[
        {name:'Water Heater / Water Softener',helper1:100,helper2:100,helper3:180,lead1:180,lead2:180,lead3:180},
        {name:'Water/Drain Repipe > 800 sq ft',helper1:80,helper2:120,helper3:160,lead1:180,lead2:220,lead3:260},
        {name:'Water/Drain Repipe \u2014 2 bath or less',helper1:280,helper2:320,helper3:360,lead1:400,lead2:440,lead3:480},
        {name:'Water/Drain Repipe \u2014 2 bath or more',helper1:480,helper2:520,helper3:560,lead1:600,lead2:640,lead3:680},
        {name:"Basement Breakup to 20' (incl. backfill)",helper1:240,helper2:280,helper3:320,lead1:360,lead2:400,lead3:440},

        {name:'Sump Pump System / Sewage Ejection Pump System',helper1:180,helper2:220,helper3:260,lead1:300,lead2:340,lead3:380},
        {name:'Sewage Ejection Pump Swap',helper1:90,helper2:105,helper3:120,lead1:150,lead2:190,lead3:230},
        {name:'Main Valve & PRV / Toilet / Angle Stop / Faucet / Disposal / Halo Ion / Hose Bib',helper1:20,helper2:24,helper3:28,lead1:30,lead2:35,lead3:40}
    ],
    electrical:[
        {name:'SER Pull over 40 ft',helper1:90,helper2:90,helper3:90,lead1:150,lead2:150,lead3:150},
        {name:'Circuit Restore',helper1:50,helper2:50,helper3:50,lead1:75,lead2:75,lead3:75},
        {name:'Basement Rough In',helper1:312,helper2:372,helper3:420,lead1:520,lead2:620,lead3:700},
        {name:'Meter / Panel Combo',helper1:252,helper2:294,helper3:336,lead1:420,lead2:490,lead3:560},
        {name:'Panel',helper1:150,helper2:168,helper3:192,lead1:250,lead2:280,lead3:320},
        {name:'Sub-panel',helper1:130,helper2:145,helper3:168,lead1:215,lead2:245,lead3:280},
        {name:'Meter',helper1:150,helper2:168,helper3:192,lead1:250,lead2:280,lead3:320},
        {name:'Whole House Re-wire \u2014 up to 2500 sq ft',helper1:840,helper2:978,helper3:1104,lead1:1400,lead2:1630,lead3:1840},
        {name:'Whole House Re-wire \u2014 2500\u20133500 sq ft',helper1:1700,helper2:1780,helper3:1830,lead1:2650,lead2:2850,lead3:3050},
        {name:'Home Run',helper1:50,helper2:50,helper3:50,lead1:75,lead2:75,lead3:75},
        {name:'Generator',helper1:210,helper2:210,helper3:210,lead1:320,lead2:320,lead3:320}
    ],
    underground:[
        {name:'Dig',helper1:100,helper2:120,helper3:140,lead1:160,lead2:180,lead3:210},
        {name:'Non-typical Dig',helper1:160,helper2:170,helper3:180,lead1:200,lead2:220,lead3:240},
        {name:'Liner / ft',helper1:2,helper2:2.5,helper3:3,lead1:3.5,lead2:4,lead3:4.5},
        {name:'Backfill',helper1:100,helper2:130,helper3:150,lead1:160,lead2:180,lead3:210},
        {name:'Non-typical Backfill',helper1:160,helper2:170,helper3:180,lead1:200,lead2:220,lead3:240},
        {name:'Hand Dig',helper1:140,helper2:160,helper3:180,lead1:220,lead2:250,lead3:275}
    ]
};

const SESSION_KEY='ait_session',TIMEOUT_MS=30*60*1000;
let sess=null; try{sess=JSON.parse(localStorage.getItem(SESSION_KEY));}catch(e){}
const selected=localStorage.getItem('installSelectedPerson');
if(!sess||!selected||(Date.now()-(sess.lastActivity||0))>=TIMEOUT_MS){location.href='install_index.html';}

let me=null, currentDate=new Date(), selectedDate=null, recallsRef=null, allLogs={}, recCache={};
function lockedRec(id){return !!(recCache[id]&&recCache[id].approved);}
let RATES={items:{},hourlyTiers:{}};
db.ref('installRates').on('value',s=>{const v=s.val()||{};RATES={items:v.items||{},hourlyTiers:v.hourlyTiers||{}};});
db.ref('installLogs').on('value',s=>{allLogs=s.val()||{};});

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const dk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function getWeek(date){const day=date.getDay(),diff=date.getDate()-day+(day===0?-6:1),mon=new Date(date);mon.setDate(diff);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function fmt$(n){return '$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
const myTier=()=>(me&&me.tier)||'lead1';
function rateFor(trade,i){const tier=myTier();const saved=RATES.items&&RATES.items[trade]&&RATES.items[trade][i];if(saved&&saved[tier]!=null&&saved[tier]!=='')return parseFloat(saved[tier])||0;const def=RATE_SHEET[trade]&&RATE_SHEET[trade][i];return def&&def[tier]!=null?parseFloat(def[tier])||0:null;}
function hourlyForTier(){const tier=myTier();const v=(RATES.hourlyTiers&&RATES.hourlyTiers[tier]!=null&&RATES.hourlyTiers[tier]!=='')?RATES.hourlyTiers[tier]:HOURLY_TIERS[tier];return parseFloat(v)||0;}
function jobPay(c){let p=0;if(c.pieceItems){Object.keys(c.pieceItems).forEach(i=>{if(c.pieceItems[i]){const q=(c.pieceQty&&c.pieceQty[i]!=null&&c.pieceQty[i]!=='')?parseFloat(c.pieceQty[i]):1;const a=parseFloat((c.pieceAmounts&&c.pieceAmounts[i])||0)||0;p+=(isNaN(q)?0:q)*a;}});}p+=(parseFloat(c.hours)||0)*(parseFloat(c.hourlyRate)||0);return p;}

function findInstallByJob(job){const j=(job||'').trim().toLowerCase();if(!j)return null;let hit=null;Object.entries(allLogs).forEach(([d,day])=>Object.entries(day).forEach(([id,r])=>{if((r.jobNumber||'').trim().toLowerCase()===j){if(!hit||(r.ts||0)<(hit.ts||0))hit={...r,_id:id,_dk:d};}}));return hit;}

db.ref('installPeople/'+selected).once('value',snap=>{
    const p=snap.val();
    if(!p){location.href='install_index.html';return;}
    me={id:selected,name:p.name,group:p.group||'plumbing',tier:p.tier||'lead1'};
    document.getElementById('personName').textContent=t('logging_for')+' '+p.name+' \u00b7 '+(t('g_'+me.group)||me.group);
    renderCalendar();
});

function renderCalendar(){
    const week=getWeek(currentDate);
    document.getElementById('weekRange').textContent=`${week[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} \u2014 ${week[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`.toUpperCase();
    const grid=document.getElementById('calendarDays');grid.innerHTML='';
    week.forEach(()=>{const slot=document.createElement('button');slot.className='cal-day';slot.innerHTML='<div class="cal-day-num" style="opacity:.2">\u2014</div>';grid.appendChild(slot);});
    week.forEach((d,i)=>{
        db.ref('recalls/'+dk(d)).once('value',snap=>{
            const all=snap.val();const arr=all?Object.values(all).filter(r=>(r.personId||r.loggedById)===selected):[];
            const n=arr.length;const dateKey=dk(d),isSel=selectedDate===dateKey;const btn=grid.children[i];
            btn.className='cal-day'+(n>0?' has-calls':'')+(isSel?' selected':'');
            btn.innerHTML=`<div class="cal-day-num">${d.getDate()}</div>${n>0?`<div class="cal-day-stat">${n} ${n>1?t('recalls_word'):t('recall_word')}</div>`:`<div class="cal-day-empty">\u2014</div>`}`;
            btn.onclick=()=>{selectedDate=isSel?null:dateKey;renderCalendar();if(selectedDate)renderRecalls(d);else hideExtras();};
        });
    });
}

function renderRecalls(date){
    document.getElementById('recallsSection').style.display='block';
    document.getElementById('fabAdd').style.display='flex';
    document.getElementById('addBottom').style.display='block';
    document.getElementById('dayTitle').textContent=date.toLocaleDateString(LANG==='es'?'es-ES':'en-US',{weekday:'long',month:'short',day:'numeric'})+' \u2014 '+t('day_recalls');
    const path='recalls/'+dk(date);
    if(recallsRef)recallsRef.off();
    recallsRef=db.ref(path);
    recallsRef.on('value',snap=>{
        const all=snap.val();
        const arr=all?Object.keys(all).map(id=>({id,...all[id]})).filter(r=>(r.personId||r.loggedById)===selected):[];
        arr.sort((a,b)=>(a.ts||0)-(b.ts||0));
        recCache={};arr.forEach(r=>recCache[r.id]=r);
        const c=document.getElementById('recallsList');
        if(!arr.length){c.innerHTML='<p style="color:var(--muted);text-align:center;padding:32px;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;font-size:13px;">'+t('none_day')+'</p>';}
        else{c.innerHTML=arr.map(recallCard).join('');}
        renderCalendar();
    });
    const blank=()=>({personId:selected,installerName:me.name,loggedById:selected,loggedByName:me.name,workerTier:me.tier,originalJobNumber:'',customerName:'',division:me.group,payTrade:me.group,recallReason:'',faultType:'install',notes:'',linked:false,originalPersonId:null,originalInstallerName:null,originalCallId:null,originalDateKey:null,hoursOn:false,pieceOn:false,hours:0,date:dk(date),ts:Date.now()});
    const doAdd=()=>{db.ref(path).push().set(blank()).then(()=>{setTimeout(()=>{const cards=document.querySelectorAll('.call-card');if(cards.length)cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'center'});},200);});};
    document.getElementById('addTop').onclick=doAdd;
    document.getElementById('addBottom').onclick=doAdd;
    document.getElementById('fabAdd').onclick=doAdd;
}

function recallCard(c){
    const locked=!!c.approved;const dis=locked?' disabled':'';
    const trade=c.division||c.payTrade||'plumbing';
    const hoursOn=!!c.hoursOn, pieceOn=!!c.pieceOn;
    const divSel=['underground','plumbing','hvac','electrical'].map(k=>`<option value="${k}"${trade===k?' selected':''}>${t('g_'+k)}</option>`).join('');
    const faultBtns=[['install','\ud83d\udee0\ufe0f','f_install'],['manufacturer','\ud83c\udfed','f_manufacturer'],['other','\u2754','f_other']].map(([k,ic,lbl])=>`<div class="fault${c.faultType===k?' on':''}" onclick="updateRec('${c.id}','faultType','${k}')"><span class="f-icon">${ic}</span><div class="f-name">${t(lbl)}</div></div>`).join('');
    let matchHtml='';
    if(c.originalJobNumber){matchHtml = c.linked ? `<div class="match found"><div class="m-title">${t('m_found')}</div><div class="m-row">${t('m_by')} <b>${esc(c.originalInstallerName||'\u2014')}</b></div></div>` : `<div class="match none"><div class="m-title">${t('m_none')}</div></div>`;}
    const pieceBlock=pieceOn?`<div class="section-label" style="margin-top:14px;">${esc(tradeName(trade))} \u2014 ${t('piecerate_work')}</div><div class="piece-list">${(RATE_SHEET[trade]||[]).map((row,i)=>{const on=c.pieceItems&&c.pieceItems[i];const amt=(c.pieceAmounts&&c.pieceAmounts[i]!=null)?c.pieceAmounts[i]:'';const qty=(c.pieceQty&&c.pieceQty[i]!=null&&c.pieceQty[i]!=='')?c.pieceQty[i]:1;const lineTot=on?((parseFloat(qty)||0)*(parseFloat(amt)||0)):0;return `<div class="pay-row${on?' on':''}"><input type="checkbox" ${on?'checked':''}${dis} onchange="togglePiece('${c.id}',${i},this.checked,'${trade}')"><span class="pr-label">${esc(row.name)}</span>${on?`<span class="pr-qty">\u00d7<input type="number" step="1" min="0" value="${esc(qty)}"${dis} onchange="setPieceQty('${c.id}',${i},this.value)"></span><span class="pr-amt">$<input type="number" step="0.01" min="0" value="${amt}"${dis} onchange="setPieceAmount('${c.id}',${i},this.value)" placeholder="0.00"></span><span class="pr-line">${fmt$(lineTot)}</span>`:''}</div>`;}).join('')}</div>`:'';
    const hoursBlock=hoursOn?`<div class="section-label" style="margin-top:14px;">${t('opt_hours')}</div><div class="row2" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;"><div class="field"><label>${t('lbl_hoursworked')}</label><input type="number" step="0.25" min="0" value="${c.hours?esc(c.hours):''}"${dis} onchange="updateRec('${c.id}','hours',parseFloat(this.value)||0)" placeholder="${t('ph_hours')}" /></div><div class="field"><label>${t('lbl_rate')}</label><input type="number" step="0.01" min="0" value="${c.hourlyRate!=null&&c.hourlyRate!==''?esc(c.hourlyRate):''}"${dis} onchange="updateRec('${c.id}','hourlyRate',parseFloat(this.value)||0)" placeholder="${hourlyForTier()||'0.00'}" /></div></div>`:'';
    const pay=jobPay(c);
    const payLine=(hoursOn||pieceOn)?`<div class="job-pay">${t('job_pay')} <span>${fmt$(pay)}</span></div>`:'';
    const headRight=locked?`<span class="lock-badge">${t('locked_badge')}</span>`:`<button class="del-call" onclick="deleteRecall('${c.id}')">${t('del')}</button>`;
    return `<div class="call-card${locked?' approved':''}">
        <div class="call-card-header"><div class="call-label">${t('recall_label')}</div>${headRight}</div>
        ${locked?`<div class="lock-note">${t('locked_note')}</div>`:''}
        <div class="field"><label>${t('lbl_origjob')}</label><input type="text" value="${esc(c.originalJobNumber)}"${dis} onchange="setOrigJob('${c.id}',this.value)" placeholder="${t('ph_origjob')}" /></div>
        ${matchHtml}
        <div class="field"><label>${t('lbl_customer')}</label><input type="text" value="${esc(c.customerName)}"${dis} onchange="updateRec('${c.id}','customerName',this.value)" placeholder="${t('ph_customer')}" /></div>
        <div class="field"><label>${t('lbl_division')}</label><select${dis} onchange="changeDivision('${c.id}',this.value)">${divSel}</select></div>
        <div class="field"><label>${t('lbl_reason')}</label><textarea rows="2"${dis} onchange="updateRec('${c.id}','recallReason',this.value)" placeholder="${t('ph_reason')}">${esc(c.recallReason)}</textarea></div>
        <hr class="divider"><div class="section-label">${t('lbl_fault')}</div>
        <div class="fault-grid">${faultBtns}</div>
        <div class="field" style="margin-top:12px"><label>${t('lbl_notes')}</label><textarea rows="2"${dis} onchange="updateRec('${c.id}','notes',this.value)" placeholder="${t('ph_notes')}">${esc(c.notes)}</textarea></div>
        <hr class="divider"><div class="section-label">${t('pay_section')}</div>
        <div class="paytoggles"><label class="check-row pay-toggle"><input type="checkbox" ${hoursOn?'checked':''}${dis} onchange="toggleHours('${c.id}',this.checked)"><span>\ud83d\udcb5 ${t('opt_hours')}</span></label><label class="check-row pay-toggle"><input type="checkbox" ${pieceOn?'checked':''}${dis} onchange="togglePieceSection('${c.id}',this.checked)"><span>\ud83d\udd27 ${t('opt_piece')}</span></label></div>
        ${hoursBlock}${pieceBlock}${payLine}
    </div>`;
}

function curPath(){return 'recalls/'+selectedDate;}
function updateRec(id,field,value){if(lockedRec(id))return;db.ref(`${curPath()}/${id}/${field}`).set(value);}
function setOrigJob(id,val){if(lockedRec(id))return;const base=`${curPath()}/${id}`;db.ref(`${base}/originalJobNumber`).set(val);const hit=findInstallByJob(val);if(hit){const u={linked:true,originalPersonId:hit.personId,originalInstallerName:hit.installerName||null,originalCallId:hit._id,originalDateKey:hit._dk};db.ref(base).once('value',s=>{const r=s.val()||{};if(!r.customerName&&hit.customerName)u.customerName=hit.customerName;db.ref(base).update(u);});}else{db.ref(base).update({linked:false,originalPersonId:null,originalInstallerName:null,originalCallId:null,originalDateKey:null});}}
function changeDivision(id,val){if(lockedRec(id))return;const base=`${curPath()}/${id}`;db.ref(`${base}/division`).set(val);db.ref(`${base}/payTrade`).set(val);db.ref(`${base}/pieceItems`).remove();db.ref(`${base}/pieceAmounts`).remove();db.ref(`${base}/pieceQty`).remove();}
function toggleHours(id,on){if(lockedRec(id))return;const base=`${curPath()}/${id}`;db.ref(`${base}/hoursOn`).set(!!on);if(on){db.ref(`${base}/hourlyRate`).once('value',s=>{if(s.val()==null||s.val()==='')db.ref(`${base}/hourlyRate`).set(hourlyForTier());});}else{db.ref(`${base}/hours`).set(0);}}
function togglePieceSection(id,on){if(lockedRec(id))return;const base=`${curPath()}/${id}`;db.ref(`${base}/pieceOn`).set(!!on);if(!on){db.ref(`${base}/pieceItems`).remove();db.ref(`${base}/pieceAmounts`).remove();db.ref(`${base}/pieceQty`).remove();}}
function togglePiece(id,i,checked,trade){if(lockedRec(id))return;const base=`${curPath()}/${id}`;db.ref(`${base}/pieceItems/${i}`).set(checked?true:null);if(checked){const r=rateFor(trade,i);if(r!=null)db.ref(`${base}/pieceAmounts/${i}`).set(r);db.ref(`${base}/pieceQty/${i}`).once('value',s=>{if(s.val()==null)db.ref(`${base}/pieceQty/${i}`).set(1);});}else{db.ref(`${base}/pieceAmounts/${i}`).remove();db.ref(`${base}/pieceQty/${i}`).remove();}}
function setPieceAmount(id,i,val){if(lockedRec(id))return;db.ref(`${curPath()}/${id}/pieceAmounts/${i}`).set(parseFloat(val)||0);}
function setPieceQty(id,i,val){if(lockedRec(id))return;const q=val===''?1:(parseFloat(val)||0);db.ref(`${curPath()}/${id}/pieceQty/${i}`).set(q);}
function deleteRecall(id){if(lockedRec(id)){alert(t('locked_note'));return;}if(confirm(t('confirm_del')))db.ref(`${curPath()}/${id}`).remove();}

function hideExtras(){document.getElementById('recallsSection').style.display='none';document.getElementById('fabAdd').style.display='none';document.getElementById('addBottom').style.display='none';if(recallsRef){recallsRef.off();recallsRef=null;}}
document.getElementById('prevWeek').onclick=()=>{currentDate=new Date(currentDate.getTime()-7*864e5);selectedDate=null;hideExtras();renderCalendar();};
document.getElementById('nextWeek').onclick=()=>{currentDate=new Date(currentDate.getTime()+7*864e5);selectedDate=null;hideExtras();renderCalendar();};
</script>
